<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eisha Makeup Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-page-bg">

<div class="login-overlay">
    <div class="login-box">
        <div class="login-header">
            <img src="logo.png" alt="Eisha Logo" class="auth-logo">
            <h2>Welcome Back</h2>
            <p>Login to your account to continue</p>
        </div>

        <form onsubmit="event.preventDefault(); loginUser(this.email.value, this.password.value);">
            <div class="field">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="field">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="auth-btn">Login Now</button>
        </form>
        
        <div class="auth-footer">
            <p>New here? <a href="signup.html">Create Account</a></p>
            <p><a href="index.html">← Back to Store</a></p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
